-- conky.conf вЂ” personal config
-- colors/font sourced from coat: ~/.config/conky/coat-theme.lua

dofile(os.getenv('HOME') .. '/.config/conky/coat-theme.lua')

conky.config = {
    out_to_wayland = true,
    out_to_x = false,

    alignment = 'top_right',
    gap_x = 24,
    gap_y = 24,

    background = true,
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    draw_borders = false,
    draw_outline = false,
    draw_shades = false,
    draw_graph_borders = false,
    double_buffer = true,
    update_interval = 2.0,
    cpu_avg_samples = 4,
    net_avg_samples = 2,
    no_buffers = true,
    uppercase = false,
    use_spacer = 'none',

    font = coat_font,
    default_color = coat_fg,
    color1 = coat_accent,
    color2 = coat_dim,
    color3 = coat_green,
    color4 = coat_red,
}

conky.text = [[
${color1}${time %H:%M:%S}$color  ${color2}${time %A %B %e}$color
${color2}${nodename}  ${kernel}  up ${uptime_short}$color

${color2}в”Ђв”Ђ cpu в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}pkg    $color${hwmon 7 temp 1}В°C  ${color2}load  $color${cpu cpu0}%
${color2}c1 $color${cpu cpu1}% ${color2}c2 $color${cpu cpu2}% ${color2}c3 $color${cpu cpu3}% ${color2}c4 $color${cpu cpu4}%
${color2}c5 $color${cpu cpu5}% ${color2}c6 $color${cpu cpu6}% ${color2}c7 $color${cpu cpu7}% ${color2}c8 $color${cpu cpu8}%
${color2}${cpubar cpu0 6,220}$color

${color2}в”Ђв”Ђ mem в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}used   $color${mem} / ${memmax}  ${color2}(${memperc}%)$color
${color2}${membar 6,220}$color

${color2}в”Ђв”Ђ gpu в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}temp   $color${exec nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader}В°C  ${color2}util  $color${exec nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader}
${color2}vram   $color${exec nvidia-smi --query-gpu=memory.used --format=csv,noheader} / ${exec nvidia-smi --query-gpu=memory.total --format=csv,noheader}

${color2}в”Ђв”Ђ disk в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}/      $color${fs_used /} / ${fs_size /}  ${color2}nvme ${hwmon 4 temp 1}В°C$color
${color2}${fs_bar 6,220 /}$color

${color2}в”Ђв”Ђ net в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}up     $color${upspeed wlo1}  ${color2}total  $color${totalup wlo1}
${color2}down   $color${downspeed wlo1}  ${color2}total  $color${totaldown wlo1}

${color2}в”Ђв”Ђ battery в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}${battery_status BAT1}  $color${battery_percent BAT1}%  ${color2}${battery_time BAT1}$color
${color2}${battery_bar 6,220 BAT1}$color

${color2}в”Ђв”Ђ top cpu в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}${top name 1}  $color${top cpu 1}%
${color2}${top name 2}  $color${top cpu 2}%
${color2}${top name 3}  $color${top cpu 3}%

${color2}в”Ђв”Ђ top mem в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}${top_mem name 1}  $color${top_mem mem_res 1}
${color2}${top_mem name 2}  $color${top_mem mem_res 2}
${color2}${top_mem name 3}  $color${top_mem mem_res 3}

${color2}в”Ђв”Ђ now playing в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ$color
${color2}${exec playerctl metadata --format '{{artist}}' 2>/dev/null | head -c 28}$color
${exec playerctl metadata --format '{{title}}' 2>/dev/null | head -c 28}
]]

-- conky.conf
-- colors/font from coat  →  ~/.config/conky/coat-theme.lua

dofile(os.getenv('HOME') .. '/.config/conky/coat-theme.lua')

conky.config = {
    out_to_wayland        = true,
    out_to_x              = false,

    alignment             = 'top_right',
    gap_x                 = 30,
    gap_y                 = 30,
    minimum_width         = 400,
    maximum_width         = 400,

    background            = true,
    own_window            = true,
    own_window_type       = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value  = 0,

    draw_borders          = false,
    draw_outline          = false,
    draw_shades           = false,
    draw_graph_borders    = false,
    double_buffer         = true,

    update_interval       = 1.0,
    cpu_avg_samples       = 4,
    net_avg_samples       = 2,
    no_buffers            = true,
    uppercase             = false,
    use_spacer            = 'none',

    lua_load              = '~/.config/conky/conky.lua',

    font                  = coat_font,
    default_color         = coat_fg,
    color1                = coat_accent,
    color2                = coat_dim,
    color3                = coat_green,
    color4                = coat_red,
}

conky.text = [[
${color1}${time %H:%M:%S}${alignr}${color2}${time %A  %B %-e}$color
${color2}${nodename}${alignr}up ${uptime_short}$color
${color2}────────────────────────────────────────$color

${color1}CPU${alignr}${lua conky_cpu_temp}  ${color}${cpu cpu0}%$color
${color1}${lua conky_cpubar 0 40}$color
${lua conky_cores 1 4}
${lua conky_cores 5 8}
${color2}────────────────────────────────────────$color

${color1}MEM${alignr}${mem} / ${memmax}$color
${color1}${lua conky_membar 40}$color
${color2}free ${color}${memfree}${alignr}${color2}cache ${color}${cached}

${color1}GPU${alignr}${lua conky_gpu_temp}  ${lua conky_gpu_util}$color
${color1}${lua conky_gpubar 40}$color
${color2}vram ${color}${lua conky_gpu_vram}

${color1}DISK${alignr}${color2}nvme ${color}${lua conky_nvme_temp}$color
${color1}${lua conky_diskbar 40}$color
${color2}${fs_used /} / ${fs_size /}$color
${color2}────────────────────────────────────────$color

${color1}NET${alignr}${lua conky_net_header}$color
${color2}↑ ${color}${lua conky_upspeed}${alignr}${color2}▲ ${color}${lua conky_totalup}
${color2}↓ ${color}${lua conky_downspeed}${alignr}${color2}▼ ${color}${lua conky_totaldown}

${color1}BAT${alignr}${lua conky_bat_status}  ${lua conky_bat_pct}  ${color2}${lua conky_bat_time}$color
${color1}${lua conky_batbar 40}$color
${color2}────────────────────────────────────────$color

${color1}LOAD${alignr}${color2}1m ${color}${loadavg 1}  ${color2}5m ${color}${loadavg 2}  ${color2}15m ${color}${loadavg 3}
${color2}────────────────────────────────────────$color

${color1}NOW PLAYING$color
  ${lua conky_playing}
]]

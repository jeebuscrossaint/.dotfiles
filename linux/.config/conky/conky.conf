-- conky.conf — personal config
-- colors/font come from coat: ~/.config/conky/coat-theme.lua

dofile(os.getenv('HOME') .. '/.config/conky/coat-theme.lua')

conky.config = {
    -- Wayland
    out_to_wayland = true,
    out_to_x = false,

    -- Position
    alignment = 'top_right',
    gap_x = 24,
    gap_y = 24,

    -- Window
    background = true,
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    -- Appearance
    draw_borders = false,
    draw_outline = false,
    draw_shades = false,
    draw_graph_borders = false,
    double_buffer = true,
    update_interval = 2.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    no_buffers = true,
    uppercase = false,
    use_spacer = 'none',

    -- Font & colors from coat-theme.lua
    font = coat_font,
    default_color = coat_fg,
    color1 = coat_accent,
    color2 = coat_dim,
    color3 = coat_green,
    color4 = coat_red,
}

conky.text = [[
${color1}${time %A, %B %e}$color
${color1}${time %H:%M}$color  ${color2}${time %Z}$color

${color2}── sys ────────────────$color
${color2}host   $color${nodename}
${color2}kernel $color${kernel}
${color2}uptime $color${uptime_short}

${color2}── cpu ────────────────$color
${color2}load   $color${cpu cpu0}%
${color2}temp   $color${hwmon 0 temp 1}°C
${color2}${cpubar cpu0 6,200}$color

${color2}── mem ────────────────$color
${color2}used   $color${mem} / ${memmax}
${color2}${membar 6,200}$color

${color2}── disk ───────────────$color
${color2}/      $color${fs_used /} / ${fs_size /}
${color2}${fs_bar 6,200 /}$color

${color2}── net ────────────────$color
${color2}up     $color${upspeed}
${color2}down   $color${downspeed}
]]

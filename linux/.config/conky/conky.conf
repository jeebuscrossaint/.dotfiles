-- conky.conf
-- colors/font from coat  →  ~/.config/conky/coat-theme.lua

dofile(os.getenv('HOME') .. '/.config/conky/coat-theme.lua')

conky.config = {
    out_to_wayland        = true,
    out_to_x              = false,

    alignment             = 'top_right',
    gap_x                 = 30,
    gap_y                 = 30,
    minimum_width         = 400,
    maximum_width         = 400,

    background            = true,
    own_window            = true,
    own_window_type       = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value  = 0,

    draw_borders          = false,
    draw_outline          = false,
    draw_shades           = false,
    draw_graph_borders    = false,
    double_buffer         = true,

    update_interval       = 2.0,
    cpu_avg_samples       = 4,
    net_avg_samples       = 2,
    no_buffers            = true,
    uppercase             = false,
    use_spacer            = 'none',

    lua_load              = '~/.config/conky/conky.lua',

    font                  = coat_font,
    default_color         = coat_fg,
    color1                = coat_accent,
    color2                = coat_dim,
    color3                = coat_green,
    color4                = coat_red,
}

conky.text = [[
${color1}${time %H:%M:%S}${alignr}${color2}${time %A  %B %-e}$color
${color2}${nodename}${alignr}up ${uptime_short}$color
${color2}────────────────────────────────────────$color

${color1}CPU${alignr}${color2}${hwmon 7 temp 1}°C  ${color}${cpu cpu0}%$color
${color1}${lua conky_cpubar 0 40}$color
${lua conky_cores 1 4}
${lua conky_cores 5 8}
${color2}────────────────────────────────────────$color

${color1}MEM${alignr}${mem} / ${memmax}$color
${color1}${lua conky_membar 40}$color
${color2}free ${color}${memfree}${alignr}${color2}cache ${color}${cached}

${color1}GPU${alignr}${color2}${exec nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits}°C  ${color}${exec nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits}%$color
${color1}${lua conky_gpubar 40}$color
${color2}vram ${color}${exec nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits} / ${exec nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits} MiB

${color1}DISK${alignr}${color2}nvme ${color}${hwmon 4 temp 1}°C$color
${color1}${lua conky_diskbar 40}$color
${color2}${fs_used /} / ${fs_size /}$color
${color2}────────────────────────────────────────$color

${color1}NET${alignr}${color2}wlo1  wifi ${color}${wireless_link_qual_perc wlo1}%$color
${color2}↑ ${color}${upspeed wlo1}${alignr}${color2}▲ ${color}${totalup wlo1}
${color2}↓ ${color}${downspeed wlo1}${alignr}${color2}▼ ${color}${totaldown wlo1}

${color1}BAT${alignr}${color2}${battery_status BAT1}  ${color}${battery_percent BAT1}%  ${color2}${battery_time BAT1}$color
${color1}${lua conky_batbar 40}$color
${color2}────────────────────────────────────────$color

${color2}name                cpu       mem$color
${lua conky_proc 1}
${lua conky_proc 2}
${lua conky_proc 3}
${lua conky_proc 4}
${lua conky_proc 5}
${color2}────────────────────────────────────────$color

${color1}NOW PLAYING$color
  ${lua conky_playing}
]]

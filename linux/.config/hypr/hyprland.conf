$mainMod = SUPER

# Basic applications (from Mango)
bind = $mainMod, Q, exec, kitty
bind = $mainMod, D, exec, anyrun
bind = $mainMod, C, killactive
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod, L, exec, gtklock
# bind = $mainMod, G, exec, new-wallpaper
# bind = $mainMod, B, exec, ~/.dotfiles/info.sh --dunst
bind = $mainMod, Delete, exec, ~/.dotfiles/wlboard.sh
bind = $mainMod, P, exec, ~/.dotfiles/toggle-waybar.sh
# bind = $mainMod SHIFT, P, exec, hyprpicker

# Focus direction (from Mango: bind=SUPER,Left,focusdir,left)
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

# Vim-style focus (Hyprland addition)
# bind = $mainMod, H, movefocus, l
# bind = $mainMod, J, movefocus, d
# bind = $mainMod, K, movefocus, u
# bind = $mainMod, L, movefocus, r

# Move windows (from Mango: bind=SUPER+SHIFT,Left,exchange_client,left)
bind = $mainMod SHIFT, Left, swapwindow, l
bind = $mainMod SHIFT, Down, swapwindow, d
bind = $mainMod SHIFT, Up, swapwindow, u
bind = $mainMod SHIFT, Right, swapwindow, r

# Vim-style move (Hyprland addition)
# bind = $mainMod SHIFT, H, swapwindow, l
# bind = $mainMod SHIFT, J, swapwindow, d
# bind = $mainMod SHIFT, K, swapwindow, u
# bind = $mainMod SHIFT, L, swapwindow, r

# Workspace switching (from Mango: bind=SUPER,1,view,1)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace (from Mango: bind=SUPER+SHIFT,1,tag,1)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move window to workspace silently (Hyprland addition)
# bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
# bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
# ... etc

# Layout controls (from Mango)
bind = $mainMod SHIFT, V, togglefloating
bind = $mainMod, F, fullscreen, 0  # actual fullscreen
# bind = $mainMod, M, fullscreen, 1  # maximize (keep bar/gaps)

# Scratchpad/Special workspace (from Mango scratchpad settings)
# bind = $mainMod, S, togglespecialworkspace
# bind = $mainMod SHIFT, S, movetoworkspace, special

# Cycle windows (Hyprland addition, useful for master layout)
# bind = $mainMod, Tab, cyclenext
# bind = $mainMod SHIFT, Tab, cyclenext, prev

# Group bindings (Hyprland-specific)
# bind = $mainMod, W, togglegroup
# bind = $mainMod, Tab, changegroupactive, f
# bind = $mainMod SHIFT, Tab, changegroupactive, b

# Master layout specific (from Mango's tile layout)
# bind = $mainMod, Return, layoutmsg, swapwithmaster
# bind = $mainMod, I, layoutmsg, addmaster
# bind = $mainMod, D, layoutmsg, removemaster
# bind = $mainMod, J, layoutmsg, cyclenext
# bind = $mainMod, K, layoutmsg, cycleprev

# Media keys (from Mango)
bindel = , XF86AudioRaiseVolume, exec, volumectl up
bindel = , XF86AudioLowerVolume, exec, volumectl down
bindl = , XF86AudioMute, exec, volumectl toggle-mute
bindl = , XF86AudioMicMute, exec, volumectl -m toggle-mute
bindl = , XF86Launch3, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindel = , XF86MonBrightnessUp, exec, lightctl up
bindel = , XF86MonBrightnessDown, exec, lightctl down
# bind = , XF86TouchpadToggle, # Need to find Hyprland equivalent

# Screenshot (from Mango)
bind = $mainMod SHIFT, S, exec, ~/.dotfiles/swayscreenshot.sh
# Additional useful bindings (Hyprland-specific)
# bind = $mainMod, P, pin  # pin window
# bind = $mainMod, Escape, exit  # exit Hyprland
# bind = $mainMod, V, pseudo  # dwindle pseudotile
# bind = $mainMod, J, togglesplit  # dwindle toggle split

# ============================================
# MOUSE BINDINGS
# ============================================
# From Mango: mousebind=SUPER,btn_left,moveresize,curmove
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# From Mango: mousebind=SUPER+CTRL,btn_right,killclient
# Hyprland doesn't support mouse binds with other actions, use window rules instead

# Mouse wheel workspace switching (Hyprland addition)
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

# ============================================
# RESIZE MODE (Submap)
# ============================================
# From Mango resize keymode
bind = $mainMod, R, submap, resize

submap = resize
binde = , Left, resizeactive, -20 0
binde = , Up, resizeactive, 0 -20
binde = , Right, resizeactive, 20 0
binde = , Down, resizeactive, 0 20

# Vim-style resize (Hyprland addition)
# binde = , H, resizeactive, -20 0
# binde = , J, resizeactive, 0 20
# binde = , K, resizeactive, 0 -20
# binde = , L, resizeactive, 20 0

bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# ============================================
# GESTURES (Custom - replaces Mango gesturebinds)
# ============================================
# From Mango gesturebinds - converted to new gesture system
# gesturebind=none,left,3,focusdir,left -> gesture swipe:3:l
# gesturebind=none,right,3,focusdir,right -> gesture swipe:3:r
# gesturebind=none,up,3,focusdir,up -> gesture swipe:3:u
# gesturebind=none,down,3,focusdir,down -> gesture swipe:3:d
# gesturebind=none,left,4,viewtoleft_have_client -> gesture swipe:4:l workspace
# gesturebind=none,right,4,viewtoright_have_client -> gesture swipe:4:r workspace

# Hyprland gesture syntax: gesture = TYPE:FINGERS:ONOFF, COMMAND
# gesture = swipe:3:horizontal, workspace
# gesture = swipe:3:vertical, fullscreen
# gesture = swipe:3:u, movetoworkspace, special
# gesture = swipe:4:horizontal, workspace

# Note: Hyprland's gesture system is different from Mango's
# Use workspace_swipe settings in gestures{} block instead

# ============================================
# PER-DEVICE INPUT CONFIGS
# ============================================
# Hyprland-specific feature, Mango doesn't have this
# Get device names with: hyprctl devices

# Example:
# device {
#     name = epic-mouse-v1
#     sensitivity = -0.5
# }

# device {
#     name = royuan-akko-multi-modes-keyboard-b
#     repeat_rate = 50
#     repeat_delay = 500
# }

# ============================================
# ADDITIONAL HYPRLAND FEATURES
# (Not present in Mango)
# ============================================

# Source additional config files
# source = ~/.config/hypr/monitors.conf
# source = ~/.config/hypr/keybinds.conf

# Plugin loading (if using hyprpm)
# plugin = /path/to/plugin.so

# Color picker (hyprpicker is installed)
# Already have keybind: $mainMod SHIFT, P

# IPC commands via hyprctl:
# hyprctl dispatch exec kitty
# hyprctl keyword general:gaps_in 10
# hyprctl reload
# hyprctl kill
# And many more...

# ============================================
# NOTES
# ============================================
# 1. Mango's "view" command maps to Hyprland's "workspace"
# 2. Mango's "tag" command maps to Hyprland's "movetoworkspace"
# 3. Mango's "exchange_client" maps to Hyprland's "swapwindow"
# 4. Mango's tile layout is similar to Hyprland's master layout
# 5. Many Mango-specific features (scroller layout, overview, etc.) don't have direct Hyprland equivalents
# 6. Hyprland has many additional features like groups, special workspaces, animations, etc.
# 7. Touchpad toggle might need custom script or tool
# 8. Gestures work differently - Mango uses gesturebind, Hyprland uses gesture or workspace_swipe
# 
# Explore more at: https://wiki.hypr.land/

# Smart Gaps, Smart Borders
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

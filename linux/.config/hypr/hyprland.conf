# ============================================
# HYPRLAND CONFIGURATION
# Converted from MangoWC configuration
# Includes ALL Hyprland options for reference
# ============================================

# Source color scheme (matching Mango's coat-colors.conf)
source = ~/.config/hypr/coat-theme.conf

# ============================================
# MONITORS
# ============================================
# Syntax: monitor=NAME,RES@RATE,POSITION,SCALE,transform,VRR,BITDEPTH,OUTPUT
# From Mango: monitorrule=eDP-1,0.55,1,tile,0,1,0,0,2560,1600,240
# From Mango: monitorrule=HDMI-A-1,0.55,1,tile,0,1,2560,0,1920,1080,60

monitor=eDP-1,2560x1600@240,0x0,1.0  # 0.55 in Mango ≈ 1.82 scale, 1.60 is good balance
monitor=HDMI-A-1,1920x1080@60,2560x0,1.60

# Mirror a monitor
# monitor=DP-3,1920x1080@60,0x0,1,mirror,DP-2

# Disable a monitor
# monitor=name,disable

# Setting the preferred mode automatically
# monitor=,preferred,auto,auto

# ============================================
# ENVIRONMENT VARIABLES
# ============================================
env=XCURSOR_SIZE,24
env=QT_QPA_PLATFORM,wayland;xcb
env=QT_QPA_PLATFORMTHEME,qt6ct
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=GTK_IM_MODULE,fcitx
env=QT_IM_MODULE,fcitx
env=SDL_IM_MODULE,fcitx
env=XMODIFIERS,@im=fcitx
env=GLFW_IM_MODULE,ibus

# Additional env vars you might want (commented out):
# env=GDK_BACKEND,wayland,x11
# env=QT_WAYLAND_DISABLE_WINDOWDECORATION,1
# env=MOZ_ENABLE_WAYLAND,1
# env=WLR_NO_HARDWARE_CURSORS,1
# env=WLR_RENDERER_ALLOW_SOFTWARE,1
# env=CLUTTER_BACKEND,wayland
# env=XDG_CURRENT_DESKTOP,Hyprland
# env=XDG_SESSION_TYPE,wayland
# env=XDG_SESSION_DESKTOP,Hyprland

# Export to D-Bus/systemd
# envd=XCURSOR_SIZE,24

# ============================================
# GENERAL SETTINGS
# ============================================
general {
    # Gaps (from Mango: gappih=30, gappiv=30, gappoh=50, gappov=50)
    gaps_in = 0
    gaps_out = 0
    
    # Float-specific gaps (Mango doesn't have this)
    # gaps_out: gaps between windows and monitor edges for floating windows
    # -1 means use gaps_out value
    # float_gaps = 0
    
    # Gaps between workspaces (Mango doesn't have this)
    # gaps_workspaces = 0
    
    # Border (from Mango: borderpx=4)
    border_size = 2
    
    # Border colors (themed with coat)
    col.inactive_border = $base03
    col.active_border = $base0D
    
    # Additional border colors (Mango doesn't have these)
    # col.nogroup_border = 0xffffaaff
    # col.nogroup_border_active = 0xffff00ff
    
    # Layout
    layout = dwindle
    
    # Don't fallback focus (Mango doesn't have this)
    # no_focus_fallback = false
    
    # Resize on border (Mango doesn't have this)
    # resize_on_border = false
    # extend_border_grab_area = 15
    # hover_icon_on_border = true
    
    # Allow tearing (from Mango: allow_tearing=1)
    allow_tearing = true
    
    # Resize corner behavior (Mango doesn't have this)
    # resize_corner = 0
    
    # Modal parent blocking (Mango doesn't have this)
    # modal_parent_blocking = true
    
    # Locale override (Mango doesn't have this)
    # locale =
    
    # Snapping for floating windows (from Mango: enable_floating_snap=0)
    snap {
        enabled = false
        # window_gap = 10
        # monitor_gap = 10
        # border_overlap = false
        # respect_gaps = false
    }
}

# ============================================
# DECORATION
# ============================================
decoration {
    # Rounding (from Mango: border_radius=15)
    rounding = 0
    
    # Rounding power/curve (Mango doesn't have this)
    rounding_power = 4.0  # 2.0 is circle, 4.0 is squircle
    
    # Opacity (from Mango: focused_opacity=1.0, unfocused_opacity=0.8)
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    
    # Dimming (Mango doesn't have these)
    # dim_modal = true
    # dim_inactive = false
    # dim_strength = 0.5
    # dim_special = 0.2
    # dim_around = 0.4
    
    # Screen shader (Mango doesn't have this)
    # screen_shader =
    
    # Border part of window (Mango doesn't have this)
    # border_part_of_window = true
    
    # Drop shadows — levitating effect (shadow pools below, not all around)
    shadow {
        enabled = false
        range = 20
        render_power = 2
        ignore_window = true
        color = rgba(00000088)  # ~53% opacity — softer than full black
        offset = 0 0            # push shadow downward for floating look
    }
    
    # Layer shadows (from Mango: layer_shadows=1)
    # Note: Hyprland doesn't have a direct equivalent
    
    # Blur (from Mango: blur=1, blur_layer=1, blur_optimized=1)
    blur {
        enabled = false
        size = 5  # from Mango blur_params_radius=5
        passes = 3  # from Mango blur_params_num_passes=3
        
        # Advanced blur settings (from Mango blur_params_*)
        noise = 0.00  # from Mango blur_params_noise=0.00
        contrast = 1.0  # from Mango blur_params_contrast=1.0  
        brightness = 1.0  # from Mango blur_params_brightness=1.0
        vibrancy = 1.0  # from Mango blur_params_saturation=1.2
        
        # Additional blur options (Mango doesn't have these)
        ignore_opacity = true
        new_optimizations = true
        # xray = false
        # vibrancy_darkness = 0.0
        # special = false
        # popups = false
        # popups_ignorealpha = 0.2
        # input_methods = false
        # input_methods_ignorealpha = 0.2
    }
}

# ============================================
# ANIMATIONS
# ============================================
# From Mango: animations=1, layer_animations=0
animations {
    enabled = false
    
    # Workspace wraparound (Mango doesn't have this)
    # workspace_wraparound = false
    
    # From Mango animation settings:
    # animation_type_open=fade, animation_type_close=fade
    # layer_animation_type_open=fade, layer_animation_type_close=fade
    # animation_duration_*=200
    
    # Define bezier curves (from Mango animation_curve_*)
    bezier = myBezierOpen, 0.46, 1.0, 0.29, 1  # animation_curve_open
    bezier = myBezierMove, 0.46, 1.0, 0.29, 1  # animation_curve_move  
    bezier = myBezierClose, 0.08, 0.92, 0, 1   # animation_curve_close
    bezier = myBezierFade, 0.46, 1.0, 0.29, 1  # animation_curve_opafadein
    
    # Define animations
    # Syntax: NAME,ONOFF,SPEED,CURVE[,STYLE]
    # Valid styles: slide, popin, fade (not fadeIn/fadeOut)

    animation = fade, 1, 2, myBezierFade
    animation = fadeIn, 1, 2, myBezierFade
    animation = fadeOut, 1, 2, myBezierFade
    
    animation = windowsIn, 1, 2, myBezierOpen, slide
    animation = windowsOut, 1, 2, myBezierClose, slide
    animation = windowsMove, 1, 2, myBezierMove, slide    
    # Border animation (Mango doesn't have this)
    animation = border, 1, 2, default
    animation = borderangle, 1, 2, default
    
    # Workspace animations (from Mango animation_duration_tag=200)
    animation = workspaces, 1, 2, myBezierMove, slide
    # animation = workspaces, 1, 2, myBezierMove, slidevert
    # animation = workspaces, 1, 2, myBezierMove, fade
    
    # Special workspace (Mango doesn't have this)
    animation = specialWorkspace, 1, 2, myBezierMove, slidevert
    
    # Layer animations disabled (from Mango layer_animations=0)
    animation = layers, 0
    animation = layersIn, 0
    animation = layersOut, 0
}

# Additional animation options that Mango has but Hyprland doesn't directly support:
# - zoom_initial_ratio, zoom_end_ratio
# - tag_animation_direction
# These are compositor-specific

# ============================================
# INPUT
# ============================================
input {
    # Keyboard (from Mango: repeat_rate=50, repeat_delay=200, numlockon=1)
    repeat_rate = 50
    repeat_delay = 200
    numlock_by_default = true
    
    # Keyboard layout (Mango doesn't specify)
    kb_layout = us
    # kb_variant =
    # kb_model =
    # kb_options =
    # kb_rules =
    # kb_file =
    
    # Resolve binds by symbol (Mango doesn't have this)
    # resolve_binds_by_sym = false
    
    # Mouse/Touchpad (from Mango accel_profile=2, accel_speed=0.0)
    sensitivity = 0.0
    accel_profile = adaptive  # 0=flat, 1=adaptive, 2=custom
    # force_no_accel = false
    
    # Additional mouse options (Mango doesn't have these)
    # rotation = 0
    # left_handed = false  # from Mango left_handed=0
    # scroll_points =
    # scroll_method =  # 2fg, edge, on_button_down, no_scroll
    # scroll_button = 0
    # scroll_button_lock = false
    # scroll_factor = 1.0
    # natural_scroll = false  # from Mango mouse_natural_scrolling=0
    
    # Focus follows mouse (from Mango sloppyfocus=1)
    follow_mouse = 1  # 0=disabled, 1=always, 2=detach focus, 3=separate
    # follow_mouse_threshold = 0.0
    # focus_on_close = 0
    # mouse_refocus = true
    
    # Float switch override (Mango doesn't have this)
    # float_switch_override_focus = 1
    
    # Special workspace fallthrough (Mango doesn't have this)
    # special_fallthrough = false
    
    # Off window axis events (Mango doesn't  have this)
    # off_window_axis_events = 1
    
    # Emulate discrete scroll (Mango doesn't have this)
    # emulate_discrete_scroll = 1
    
    # Touchpad settings (from Mango touchpad settings)
    touchpad {
        disable_while_typing = true  # from Mango disable_while_typing=1
        natural_scroll = false  # from Mango trackpad_natural_scrolling=0
        scroll_factor = 1.0
        middle_button_emulation = false  # from Mango middle_button_emulation=0
        tap_button_map = lrm  # lrm or lmr
        clickfinger_behavior = false
        tap-to-click = true  # from Mango tap_to_click=1
        drag_lock = true  # from Mango drag_lock=1 (1=enabled with timeout)
        tap-and-drag = false  # from Mango tap_and_drag=0
        # flip_x = false
        # flip_y = false
        # drag_3fg = 0
    }
    
    # Touchdevice (Mango doesn't have this)
    # touchdevice {
    #     transform = -1
    #     output =
    #     enabled = true
    # }
    
    # Virtual keyboard (Mango doesn't have this)
    # virtualkeyboard {
    #     share_states = 2
    #     release_pressed_on_close = false
    # }
    
    # Tablet settings (Mango doesn't have this)
    # tablet {
    #     transform = -1
    #     output =
    #     region_position = 0 0
    #     absolute_region_position = false
    #     region_size = 0 0
    #     relative_input = false
    #     left_handed = false
    #     active_area_size = 0 0
    #     active_area_position = 0 0
    # }
}

# ============================================
# GESTURES
# ============================================
# From Mango gesturebind settings
gestures {
    # workspace_swipe = false  # Use gesture binds instead
    # workspace_swipe_fingers = 3  # Removed in favor of gesture system
    # workspace_swipe_min_fingers = 2  # Removed
    workspace_swipe_distance = 300  # from Mango swipe_min_threshold=20 (different meaning)
    workspace_swipe_touch = false
    workspace_swipe_invert = true
    workspace_swipe_touch_invert = false
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_forever = false
    workspace_swipe_use_r = false
    close_max_timeout = 1000
}


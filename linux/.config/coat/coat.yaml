# ~/.config/coat/coat.yaml

# The 'enabled' key triggers STATE_ENABLED and expects a sequence (list)
enabled:
  - hyprland
  - fish
  - foot
  - helix
  - fuzzel
  - bat
  - btop
  - dunst
  - zathura
  - gtk
  - vesktop
  - sway
  - qt
  - waybar
  - labwc
  - swaylock
  
# The 'scheme' key is a top-level scalar
scheme: paul-millr
prefer_base24: false
# material_you: true

opacity:
  terminal: 0.7
  applications: 1.0
  desktop: 1.0
  popups: 1.0

# The 'font' key triggers in_font_section and expects a mapping (dictionary)
font:
  emoji: "Noto Color Emoji"
  monospace: "0xProto Nerd Font Mono"
  sansserif: "0xProto Nerd Font"
  serif: "0xProto Nerd Font"
  sizes:
    terminal: 8
    desktop: 8
    popups: 7

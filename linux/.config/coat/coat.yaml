# ~/.config/coat/coat.yaml

# The 'enabled' key triggers STATE_ENABLED and expects a sequence (list)
enabled:
  - hyprland
  - fish
  - kitty
  - helix
  - rofi
  - bat
  - btop
  - dunst
  - zathura
  - yazi
  - gtk
  - vesktop
  - sway
  - qt
  - waybar
  - labwc
  
# The 'scheme' key is a top-level scalar
scheme: dimmed-monokai
prefer_base24: true
# material_you: true

opacity:
  terminal: 1.0
  applications: 1.0
  desktop: 1.0
  popups: 1.0

# The 'font' key triggers in_font_section and expects a mapping (dictionary)
font:
  emoji: "Noto Color Emoji"
  monospace: "BigBlueTerm437 Nerd Font Mono"
  sansserif: "BigBlueTerm437 Nerd Font"
  serif: "BigBlueTerm437 Nerd Font"
  sizes:
    terminal: 12
    desktop: 12
    popups: 12
